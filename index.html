<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>To-Do-List</h2>

        <div class="inputBox">
            <input type="text" id="input" placeholder="Enter Your Task"><button id="addBtn">Add</button>
            <button id="rset">Reset</button>
        </div>

        <div class="listBox">
            <ul id="todo-list">

            </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
